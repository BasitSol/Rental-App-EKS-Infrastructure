apiVersion: v1
kind: ServiceAccount
metadata:
  name: rental-api
  namespace: rental
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rental-client
  namespace: rental
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rental-api-config-reader
  namespace: rental
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    resourceNames:
      - rental-api-config
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rental-api-config-reader
  namespace: rental
subjects:
  - kind: ServiceAccount
    name: rental-api
    namespace: rental
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rental-api-config-reader