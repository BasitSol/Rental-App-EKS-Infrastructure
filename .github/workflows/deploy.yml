name: Deploy EKS

on:
  workflow_dispatch:
    inputs:
      auto_approve:
        description: "Auto-approve Terraform apply"
        required: true
        default: false
        type: boolean
  push:
    branches:
      - main

concurrency:
  group: eks-deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPO_API: rental/api
  ECR_REPO_CLIENT: rental/client
  TF_VAR_enable_k8s_resources: "true"

jobs:
  build-plan-apply:
    name: Build, Plan & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 21600 # 6 hours - covers long apply/destroy runs

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api-staging
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_API }}:${{ github.sha }}
          cache-from: type=gha,scope=api-staging
          cache-to: type=gha,mode=max,scope=api-staging

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client-staging
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_CLIENT }}:${{ github.sha }}
          cache-from: type=gha,scope=client-staging
          cache-to: type=gha,mode=max,scope=client-staging

      - name: Resolve image digests
        id: digests
        run: |
          API_DIGEST=$(aws ecr describe-images --repository-name "$ECR_REPO_API" --image-ids imageTag="$GITHUB_SHA" --query 'imageDetails[0].imageDigest' --output text)
          CLIENT_DIGEST=$(aws ecr describe-images --repository-name "$ECR_REPO_CLIENT" --image-ids imageTag="$GITHUB_SHA" --query 'imageDetails[0].imageDigest' --output text)
          echo "api_image=${{ steps.login-ecr.outputs.registry }}/$ECR_REPO_API@$API_DIGEST" >> "$GITHUB_OUTPUT"
          echo "client_image=${{ steps.login-ecr.outputs.registry }}/$ECR_REPO_CLIENT@$CLIENT_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform init
        run: terraform -chdir=terraform/environments/eks-production init

      - name: Restore scheduled-for-deletion secrets
        # If a previous `terraform destroy` left the Secrets Manager entries in their
        # 7-day recovery window, restore them and re-import into Terraform state so
        # the recreate doesn't fail with "scheduled for deletion".
        run: |
          set -euo pipefail
          declare -A SECRETS=(
            ["mongodb_uri"]="/rentalapp/eks-prod/mongodb_uri"
            ["session_secret"]="/rentalapp/eks-prod/session_secret"
            ["jwt_secret"]="/rentalapp/eks-prod/jwt_secret"
          )
          for tf_name in "${!SECRETS[@]}"; do
            aws_name="${SECRETS[$tf_name]}"
            deleted_date=$(aws secretsmanager describe-secret \
              --secret-id "$aws_name" \
              --region "$AWS_REGION" \
              --query 'DeletedDate' --output text 2>/dev/null || echo "None")
            if [ "$deleted_date" != "None" ] && [ -n "$deleted_date" ]; then
              echo "Restoring scheduled-for-deletion secret: $aws_name (was deleted $deleted_date)"
              aws secretsmanager restore-secret --secret-id "$aws_name" --region "$AWS_REGION"
              arn=$(aws secretsmanager describe-secret --secret-id "$aws_name" --region "$AWS_REGION" --query ARN --output text)
              # Import only if not already in state
              if ! terraform -chdir=terraform/environments/eks-production state list \
                  | grep -qx "module.app_secrets.aws_secretsmanager_secret.${tf_name}"; then
                terraform -chdir=terraform/environments/eks-production import \
                  "module.app_secrets.aws_secretsmanager_secret.${tf_name}" "$arn"
              fi
            fi
          done

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.30.0'

      - name: Check cluster auth and drop stale K8s state if needed
        # If a previous destroy removed the EKS access entry or the cluster itself,
        # Terraform will fail during `plan` trying to refresh helm_release / kubernetes_
        # resources. We test actual kubectl auth; if it fails we purge those stale state
        # entries (including access entry / access policy) so `plan` treats them as new.
        continue-on-error: true
        run: |
          set +e
          cd terraform/environments/eks-production

          # First check: does the cluster exist at all?
          if ! aws eks describe-cluster --name rentalapp-eks-prod-eks --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "EKS cluster not found — dropping stale K8s/helm/access entry resources from Terraform state"
            targets=$(terraform state list 2>/dev/null | grep -E '^(helm_release|kubernetes_|kubectl_manifest|data\.kubernetes_|aws_eks_access_entry|aws_eks_access_policy_association)' || true)
            for t in $targets; do
              echo "Removing $t from state"
              terraform state rm "$t" || true
            done
            exit 0
          fi

          # Second check: can we actually authenticate to it?
          # (The access entry may have been destroyed even though the cluster still exists.)
          aws eks update-kubeconfig --name rentalapp-eks-prod-eks --region "$AWS_REGION" >/dev/null 2>&1
          if ! kubectl cluster-info >/dev/null 2>&1; then
            echo "EKS cluster exists but kubectl auth failed — access entry likely missing."
            echo "Dropping K8s/helm/access entry resources from Terraform state so they get recreated."
            targets=$(terraform state list 2>/dev/null | grep -E '^(helm_release|kubernetes_|kubectl_manifest|data\.kubernetes_|aws_eks_access_entry|aws_eks_access_policy_association)' || true)
            for t in $targets; do
              echo "Removing $t from state"
              terraform state rm "$t" || true
            done
          else
            echo "EKS cluster reachable and authenticated — K8s state is valid"
          fi

      - name: Terraform plan
        id: plan
        env:
          TF_VAR_mongodb_uri: ${{ secrets.MONGODB_URI }}
          TF_VAR_session_secret: ${{ secrets.SESSION_SECRET }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_api_image: ${{ steps.digests.outputs.api_image }}
          TF_VAR_client_image: ${{ steps.digests.outputs.client_image }}
        run: terraform -chdir=terraform/environments/eks-production plan -no-color -out=tfplan

      - name: Show Terraform plan
        if: steps.plan.outcome == 'success'
        run: terraform -chdir=terraform/environments/eks-production show -no-color tfplan

      - name: Terraform apply
        if: github.event_name == 'push' || inputs.auto_approve
        env:
          TF_VAR_mongodb_uri: ${{ secrets.MONGODB_URI }}
          TF_VAR_session_secret: ${{ secrets.SESSION_SECRET }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_api_image: ${{ steps.digests.outputs.api_image }}
          TF_VAR_client_image: ${{ steps.digests.outputs.client_image }}
        run: terraform -chdir=terraform/environments/eks-production apply -auto-approve tfplan

      - name: Verify deployment
        if: github.event_name == 'push' || inputs.auto_approve
        run: |
          aws eks update-kubeconfig --name rentalapp-eks-prod-eks --region $AWS_REGION
          kubectl -n rental rollout status deploy/api-deployment --timeout=300s
          kubectl -n rental rollout status deploy/client-deployment --timeout=300s
          echo "Deployment verified successfully"
